name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build, test, smoke-test
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      # build.ps1 builds, runs xUnit unit tests, runs the stdio smoke test
      # asserting 38 tools register, and prints SHA256 of the artifact.
      # Integration tests live in a separate project gated by
      # POWERMILL_INTEGRATION; CI doesn't have PowerMill installed so they
      # skip themselves.
      - name: Build, test, and smoke-test
        shell: pwsh
        run: ./PowerMillMcpServer/build.ps1

description = "Run the workspace orchestration pipeline — planning, review, implementation, and audit waves with parallel subagents"
prompt = """
Run the AgentBoard workspace orchestration pipeline. This command executes in the main agent context so it can dispatch the wave subagents (`planning-agent`, `review-agent`, `implementation-agent`, `audit-agent`) — those subagents cannot dispatch each other (Gemini's subagent recursion protection), so the orchestration loop has to live here.

User flags / context:
{{args}}

## Pre-flight

1. Load the `workspace-orchestration` skill for the full orchestration logic and checkpoint rules.
2. Call `mcp_agentboard_agentboard_health_check`. If only `mcp_agentboard_agentboard_authenticate` and `mcp_agentboard_agentboard_complete_authentication` are visible, run the OAuth bootstrap from `skills/agentboard/SKILL.md` §1.3 first, then re-check. Stop and report if the post-auth health check fails.
3. Select the target app via `mcp_agentboard_agentboard_list_apps`, then board via `mcp_agentboard_agentboard_list_boards`. Ask the user when ambiguous. Use `response_format: markdown`.
4. Read board settings via `mcp_agentboard_agentboard_get_board` and determine checkpoint behavior:
   - `review_blocking: true` → pause after Wave 1.
   - `audit_blocking: true` → pause after Wave 3.
   - `--auto` in arguments → skip pauses where blocking is OFF (blocking-ON checkpoints are still enforced).
   Report the checkpoint plan to the user before starting.
5. Locate the spec at `docs/specs/` (most recent) or ask the user. Save the path as `spec_path` to pass to wave agents.
6. Prime the codegraph once: `mcp_codegraph_codegraph_scan` on the project root. The graph stays in the shared codegraph MCP for every subagent in this session; wave subagents have been instructed not to call `codegraph_scan` themselves.

## Waves

For each wave, collect cards in the relevant column via `mcp_agentboard_agentboard_list_workspace_cards`, then dispatch one wave-agent invocation per card. To run them in parallel, issue all the subagent calls in a single turn. Wait for them all to complete before moving on. In every dispatch include: `card_id`, `board_id`, `agent_id` (your model name, e.g. `gemini-2.5-pro`), `card_title`, and `spec_path`.

**Wave 1 — Planning.** Cards in `backlog`. Dispatch `planning-agent` per card. Cards auto-advance to `review` on artifact submission. Checkpoint per `review_blocking`.

**Wave 2 — Review.** Cards in `review`. Dispatch `review-agent` per card. On rejection, the agent returns the card to `planning` with feedback — re-run Wave 1 for those cards (max 2 retries; escalate to the user after).

**Wave 3 — Implementation.** Cards in `implementation`. Dispatch `implementation-agent` per card. After the wave finishes, run build/lint with output filtering to keep noise out of context:
- `npm run build 2>&1 | grep -E -i 'error|warning|fail|✘' || echo 'BUILD OK'`
- `npm run lint 2>&1 | grep -E -i 'error|warning|fail|✘' || echo 'LINT OK'`
If build fails, stop and report the culprit. Checkpoint per `audit_blocking`.

**Wave 4 — Audit.** Cards in `audit`. Dispatch `audit-agent` per card. Cards advance to `finished` on PASS or stay in `audit` with the report on FAIL.

## Final report

Show the user a results table:

```
## Orchestration Complete

**Board:** <name>
**Cards:** <finished>/<total> finished

| Card | Planning | Review | Implementation | Audit | Status |
|------|----------|--------|----------------|-------|--------|
| <title> | PASS | PASS | PASS | PASS | finished |

**Build:** pass
**Lint:** pass
```

## Error handling

- Review rejection: card returns to `planning`; max 2 retries before user escalation.
- Build failure after Wave 3: stop the pipeline, report culprit files.
- Audit failure: card stays in `audit` with the audit report attached; user reviews.
- Agent crash/timeout: report it, skip that card, continue with the rest.
"""
